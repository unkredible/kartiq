<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR KART - SECURE LOGIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#cafd00",
              "background": "#0e0e0e",
              "surface": "#131313",
            },
            fontFamily: { "sans": ["Space Grotesk", "sans-serif"] }
          }
        }
      }
    </script>
    <style> body { background-color: #0e0e0e; color: #ffffff; } </style>
</head>
<body class="antialiased h-screen flex flex-col items-center justify-center font-sans tracking-widest relative overflow-hidden">

    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#cafd00 1px, transparent 1px); background-size: 40px 40px;"></div>

    <div class="z-10 w-full max-w-md bg-surface border border-white/10 p-8 shadow-2xl relative">
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-primary"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-primary"></div>

        <div class="text-center mb-8 flex flex-col items-center">
            <div class="w-3 h-3 bg-primary rounded-full animate-pulse mb-4"></div>
            <h1 class="text-2xl font-black text-white tracking-tighter">RADAR KART <span class="text-primary">LIVE</span></h1>
            <p class="text-[10px] text-white/40 mt-2 uppercase">System Telemetry Access</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <input type="password" name="password" required placeholder="INSERISCI CHIAVE DI ACCESSO" 
                       class="w-full bg-[#0e0e0e] border border-white/10 text-primary text-center tracking-[0.3em] font-mono p-4 outline-none focus:border-primary transition-colors placeholder:text-white/20">
            </div>
            <button type="submit" class="w-full bg-primary text-[#0e0e0e] font-black tracking-[0.2em] py-4 hover:bg-white transition-all active:scale-95 uppercase">
                Inizializza Sistema
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <span class="text-[9px] text-white/20">AUTHORIZED PERSONNEL ONLY</span>
        </div>
    </div>
</body>
</html>
