<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR KART - TELEMETRY DETAIL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "primary": "#cafd00",
              "secondary": "#ff51fa",
              "tertiary": "#00ffff",
              "background": "#0e0e0e",
              "surface": "#131313",
              "surface-light": "#262626",
              "error": "#ff7351",
            },
            fontFamily: { "sans": ["Space Grotesk", "sans-serif"] }
          }
        }
      }
    </script>

    <style>
        body { background-color: #0e0e0e; color: #ffffff; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #131313; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cafd00; border-radius: 3px; }
    </style>
</head>
<body class="antialiased h-screen flex flex-col font-sans uppercase tracking-widest custom-scroll">

    <header class="w-full h-16 bg-surface border-b border-white/5 flex justify-between items-center px-6 shrink-0 z-50">
        <div class="flex items-center gap-4">
            <span class="text-xl font-black text-white tracking-tighter">DATA <span class="text-primary">ANALYSIS</span></span>
        </div>
        <a href="/dashboard" class="flex items-center gap-2 bg-white/5 px-4 py-2 hover:bg-white/10 transition-colors text-xs font-bold text-white">
            <span class="text-primary">←</span> BACK TO DASHBOARD
        </a>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 flex justify-center">
        <div class="w-full max-w-4xl">
            
            <div class="mb-8 flex items-end gap-6 bg-surface p-6 border border-white/5 relative overflow-hidden shadow-2xl">
                <div class="absolute top-0 right-0 p-2 bg-primary/10">
                    <span class="text-[8px] text-primary font-black">TELEMETRY_LINK_ACTIVE</span>
                </div>
                <div class="h-20 w-2 bg-primary"></div>
                <div>
                    <p class="text-primary tracking-[0.3em] font-bold text-sm mb-1">KART <span class="text-white">{{ kart }}</span></p>
                    <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter text-white" id="display-team">
                        CARICAMENTO...
                    </h1>
                </div>
            </div>

            <div class="bg-surface border border-white/5 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#0e0e0e] text-[10px] font-black text-white/40 border-b border-white/10">
                            <th class="py-4 px-6 w-24">LAP #</th>
                            <th class="py-4 px-6 text-center">LAP TIME</th>
                            <th class="py-4 px-6 text-right">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="lap-history" class="divide-y divide-white/5 text-sm font-mono">
                        <tr><td colspan="3" class="py-8 text-center text-primary animate-pulse text-xs tracking-widest">ESTRAZIONE DATI...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script>
        const idGara = "{{ id_gara }}";
        const kart = "{{ kart }}";
        
        function caricaStorico() {
            fetch(`/api/storico_kart/${idGara}/${kart}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('display-team').innerText = data.team;
                    const tbody = document.getElementById('lap-history');
                    
                    if (data.giri.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="py-8 text-center text-white/40 font-sans tracking-widest text-xs">NESSUN DATO TELEMETRICO RILEVATO</td></tr>';
                        return;
                    }

                    tbody.innerHTML = data.giri.map(l => {
                        // Logica dei colori in base allo stato
                        let colorClass = "text-white/80"; // Normale
                        let badgeClass = "bg-white/5 text-white/40";
                        let rowClass = "hover:bg-white/5";

                        if (l.status === 'pit') {
                            colorClass = "text-error font-black";
                            badgeClass = "bg-error/20 text-error border border-error/50";
                            rowClass = "bg-error/5 hover:bg-error/10";
                        } else if (l.status === 'anomalia') {
                            colorClass = "text-secondary font-bold";
                            badgeClass = "bg-secondary/20 text-secondary border border-secondary/50";
                        } else {
                            colorClass = "text-primary font-bold"; // Evidenzia i giri normali
                        }

                        return `
                        <tr class="${rowClass} transition-colors">
                            <td class="py-4 px-6 text-white/40 font-black">${l.lap}</td>
                            <td class="py-4 px-6 text-center ${colorClass} tracking-wider text-base">${l.time}</td>
                            <td class="py-4 px-6 text-right">
                                <span class="text-[10px] px-3 py-1 font-sans font-black ${badgeClass}">${l.status.toUpperCase()}</span>
                            </td>
                        </tr>`;
                    }).join('');
                })
                .catch(err => {
                    document.getElementById('lap-history').innerHTML = '<tr><td colspan="3" class="py-8 text-center text-error font-sans text-xs">ERRORE DI CONNESSIONE</td></tr>';
                });
        }

        caricaStorico();
    </script>
</body>
</html>
